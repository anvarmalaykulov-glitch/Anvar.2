<!DOCTYPE html>
<html>
<head>
    <title>My Personal Homepage</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Контейнер */
        .container {
            display: flex;
            height: 100vh;
        }

        /* Левое меню */
        .sidebar {
            width: 250px;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            color: white;
            padding: 30px 20px;
        }

        .sidebar h2 {
            margin-bottom: 40px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 20px 0;
            font-size: 18px;
        }

        .sidebar a:hover {
            text-decoration: underline;
        }

        /* Правая часть */
        .content {
            flex: 1;
            padding: 40px;
            background: #f5f5f5;
            overflow-y: auto;
        }

        h1 {
            text-align: center;
        }

        .welcome {
            text-align: center;
            margin-top: 30px;
        }

        .welcome img {
            width: 200px;
            border-radius: 50%;
        }

        /* Форма */
        .form-section {
            margin-top: 60px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .form-section input,
        .form-section select,
        .form-section textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .form-section button {
            width: 100%;
            padding: 12px;
            background: #0f2027;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        .form-section button:hover {
            background: #203a43;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ЛЕВОЕ МЕНЮ -->
    <div class="sidebar">
        <h2>Menu</h2>
       <a href="hobbies.html">My Hobbies</a>
<a href="todo.html">Monthly To-Do Lists</a>
<a href="video.html">Featured Video</a>
    </div>
    
    <!-- ПРАВАЯ ЧАСТЬ -->
    <div class="content">

        <h1>Welcome to My Personal Space</h1>

        <div class="welcome">
            <h2>Welcome!</h2>
            <img src="https://github.com/user-attachments/assets/524760a5-3801-450c-a29a-0a0b041cd16b">
        </div>

        <div class="form-section">
            <h2>Contact Me</h2>

            <input type="text" placeholder="Full Name">
            <input type="number" placeholder="Age">

            <select>
                <option>Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <input type="email" placeholder="Email Address">

            <textarea rows="4" placeholder="Write your questions or comments here..."></textarea>

           <button onclick="showMessage()">Submit Message</button>
<script>
function showMessage() {
    alert("Your message has been sent successfully!");
}
</script>
</body>
</html>
